name: Forge
options:
  bundleIdPrefix: ai.forge
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true
  generateEmptyDirectories: true
settings:
  base:
    SWIFT_VERSION: "5.0"
    DEVELOPMENT_TEAM: ""
    CODE_SIGN_STYLE: Automatic
    CODE_SIGNING_ALLOWED: "NO"
    CODE_SIGNING_REQUIRED: "NO"
    SWIFT_STRICT_CONCURRENCY: minimal
targets:
  Forge:
    type: application
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: Forge
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: ai.forge.ios
        PRODUCT_NAME: Forge
        INFOPLIST_FILE: Forge/Info.plist
        GENERATE_INFOPLIST_FILE: "NO"
        TARGETED_DEVICE_FAMILY: "1,2"
        ENABLE_PREVIEWS: "YES"
        MARKETING_VERSION: "1.0"
        CURRENT_PROJECT_VERSION: "1"
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
  ForgeTests:
    type: bundle.unit-test
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: ForgeTests
      # Wire fixture JSON files (WP-6 parity) — copied into test bundle at build time.
      - path: ../testdata/wire
        buildPhase: resources
        type: folder
    dependencies:
      - target: Forge
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: ai.forge.ios.tests
        GENERATE_INFOPLIST_FILE: "YES"
schemes:
  Forge:
    build:
      targets:
        Forge: all
        ForgeTests: [test]
    run:
      config: Debug
    test:
      config: Debug
      targets:
        - ForgeTests
