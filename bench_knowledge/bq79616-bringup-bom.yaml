# ── IMPORTANT: designator_inferred ──────────────────────────────────────────
# The original BOM export has NO reference designator column (no R5/C1/U2).
# The `designator` fields below are SYNTHETIC, assigned deterministically using
# standard EE conventions (R/C/D/U/K/F/J/TP/X prefixes, expanded by Quantity,
# ordered by BOM Line # ascending, nulls last, then unit index within the line).
#
# These inferred designators let demo queries like lookup_bom("R5") work, but
# they are NOT authoritative schematic designators. The real schematic may use
# different numbering. A BOM export WITH a "Ref Des" column would be required to
# tie designators to schematic positions definitively.
#
# Prefix rules applied:
#   resistor → R   capacitor → C   diode → D   LED → D
#   regulator/comparator/IC → U   relay/SSR → K   fuse → F
#   connector/header → J   test-point → TP   unknown → X
#
# ── Parsed fields ────────────────────────────────────────────────────────────
# Each line item has parsed fields derived from name/description:
#   value    — canonical component value (e.g. "4.99kΩ", "0.1uF")
#   package  — footprint/package (0402/0603/0805/1206/2512/SOD123/SOT89/…)
#   type     — component class (resistor/capacitor/diode/IC/regulator/…)
#
# Expansion: each YAML item represents ONE physical unit with its own designator.
# qty on the item is the total quantity on that BOM line (shared by all units
# from that line — kept for reference).

